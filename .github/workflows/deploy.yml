name: Jupyter Book (via myst) GitHub Pages Deploy
on:
  push:
    branches: [main,master]
env:
  # `BASE_URL` determines, relative to the root of the domain.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  BASE_URL: '' 

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x

      # Install Python and dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'   # or your version

      - name: pip install
        run: |
          python -m pip install --upgrade pip

      - name: CosmoSim
        run: |
          pip install CosmoSim==3.0.0b3 --user
      - name: install packages
        run: |
          pip install -r requirements.txt

###           pip install jupyter-server nbclient nbformat ipykernel jupyter-client
      - name: Set up ipykernel
        run: python -m ipykernel install --user --name=python3

      - name: Execute Notebooks 
        run: |
          cd demo
          jupytext --sync --execute *.md
      - name: Build HTML Assets
        run: jupyter book build --html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
